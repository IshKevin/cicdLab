- hosts: all
  become: true

  tasks:
    - name: Install base packages
      yum:
        name:
          - docker
          - git
          - java-17-amazon-corretto
          - python3
          - python3-pip
        state: present

    - name: Upgrade pip
      pip:
        name: pip
        state: latest
        executable: pip3

    - name: Install pytest
      pip:
        name: pytest
        executable: pip3

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: true


- hosts: jenkins
  become: true

  tasks:
    - name: Add Jenkins repo
      get_url:
        url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
        dest: /etc/yum.repos.d/jenkins.repo

    - name: Import Jenkins key
      rpm_key:
        key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key

    - name: Install Jenkins
      yum:
        name: jenkins
        state: present

    - name: Install Ansible
      pip:
        name: ansible
        executable: pip3
        

    - name: Start Jenkins
      service:
        name: jenkins
        state: started
        enabled: true

    # ==============================
    # SSH KEY SETUP FOR ANSIBLE
    # ==============================

    - name: Create .ssh directory for Jenkins user
      file:
        path: /var/lib/jenkins/.ssh
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0700'

    - name: Copy app private key to Jenkins server
      copy:
        src: ../terraform/app-key.pem
        dest: /var/lib/jenkins/.ssh/app-key.pem
        owner: jenkins
        group: jenkins
        mode: '0400'

    - name: Ensure SSH config allows key usage
      file:
        path: /var/lib/jenkins/.ssh
        state: directory
        mode: '0700'

    # ==============================
    # OPTIONAL: CREATE BASIC INVENTORY
    # ==============================

    - name: Create Ansible inventory directory
      file:
        path: /etc/ansible
        state: directory

    - name: Create inventory file for app server
      copy:
        dest: /etc/ansible/hosts
        content: |
          [app]
          {{ hostvars['app']['ansible_host'] | default('APP_IP_HERE') }} ansible_user=ec2-user ansible_ssh_private_key_file=/var/lib/jenkins/.ssh/app-key.pem
    - name: Add app server to known_hosts
      shell: ssh-keyscan -H 54.216.65.248 >> /var/lib/jenkins/.ssh/known_hosts